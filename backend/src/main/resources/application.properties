spring.application.name=library-management
server.port=${LIBRARY_SERVICE_PORT:8082}
spring.datasource.url=${LIBRARY_DB_URL:jdbc:mysql://localhost:3306/library_db}
spring.datasource.username=${LIBRARY_DB_USERNAME:root}
spring.datasource.password=${LIBRARY_DB_PASSWORD:}
spring.datasource.driverClassName=${LIBRARY_DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.jpa.database-platform=${LIBRARY_JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=${LIBRARY_JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
server.error.include-message=always
jwt.secret=${JWT_SECRET:change-me}
