<div class="login-wrapper">
  <div class="login-card">
    <div class="login-card-header text-center">
      <div class="brand-logo-container">
        <i class="bi bi-book-half"></i>
      </div>
      <h2>SGSITS Library</h2>
      <p class="subtitle">College Library Management System</p>
    </div>

    <!-- Role Selector Tabs -->
    <div class="role-selector-tabs">
      <button type="button" [class.active]="selectedRole() === 'Student'" (click)="selectRole('Student')">
        <i class="bi bi-person-workspace"></i> Student
      </button>
      <button type="button" [class.active]="selectedRole() === 'Teacher'" (click)="selectRole('Teacher')">
        <i class="bi bi-person-video3"></i> Teacher
      </button>
      <button type="button" [class.active]="selectedRole() === 'Librarian'" (click)="selectRole('Librarian')">
        <i class="bi bi-shield-lock-fill"></i> Staff
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <!-- Input Group -->
      <div class="form-group">
        <label for="identifier">
          @if (selectedRole() === 'Student') {
          Student Enrollment Number
          } @else if (selectedRole() === 'Teacher') {
          Teacher Email Address
          } @else {
          Staff Password
          }
        </label>

        <div class="input-with-icon">
          @if (selectedRole() === 'Librarian') {
          <i class="bi bi-lock-fill input-icon"></i>
          <input type="password" id="identifier" name="identifier" [(ngModel)]="identifierInput"
            placeholder="Enter librarian password..." required />
          } @else {
          <i class="bi bi-card-text input-icon"></i>
          <input type="text" id="identifier" name="identifier" [(ngModel)]="identifierInput"
            [placeholder]="selectedRole() === 'Student' ? 'e.g. 0801CS241001' : 'e.g. rajesh.kumar@sgsits.ac.in'"
            required />
          }
        </div>
      </div>

      <!-- Error Message -->
      @if (errorMessage) {
      <div class="error-alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span>{{ errorMessage }}</span>
      </div>
      }

      <button type="submit" class="btn btn-primary w-100 py-2.5 mt-2">
        Access Dashboard
      </button>
    </form>

    <!-- Simple help card listing mock accounts for easy testing -->
    <div class="help-section">
      <div class="help-header">
        <i class="bi bi-info-circle-fill text-accent"></i>
        <span>Demo Credentials for Testing</span>
      </div>
      <div class="help-body">
        <ul>
          <li><strong>Student Enrollment:</strong> <code>0801CS241001</code>, <code>0801CS241002</code></li>
          <li><strong>Teacher Email:</strong> <code>rakesh_sharma@sgsits.ac.in</code></li>
          <li><strong>Librarian Password:</strong> <code>admin</code></li>
        </ul>
      </div>
    </div>
  </div>
</div>
